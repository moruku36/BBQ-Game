<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBQ Cooking Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">BBQ Cooking Simulator</p>
        <h1>肉を置いて、焼けたら取るだけ</h1>
      </div>

      <div class="controls">
        <div class="picker" id="ingredientPicker" aria-label="肉の種類">
          <button type="button" data-type="beef" class="active">牛カルビ</button>
          <button type="button" data-type="pork">豚バラ</button>
          <button type="button" data-type="chicken">鶏もも</button>
        </div>

        <label class="heat-control">
          <span>火力</span>
          <input id="heat" type="range" min="30" max="100" value="60">
        </label>

        <button id="restartButton" type="button" class="restart-button">焼き直す</button>
      </div>
    </header>

    <section class="game-shell">
      <canvas id="scene" aria-label="BBQ台ゲーム"></canvas>
      <div class="hud">
        <div class="hud-card">
          <span>選択中</span>
          <strong id="selectedLabel">牛カルビ</strong>
        </div>
        <div class="hud-card">
          <span>状態</span>
          <strong id="statusText">空いている場所をクリックして肉を置く</strong>
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
